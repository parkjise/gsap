<!DOCTYPE html>
<html lang="ko">
<head>
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<meta http-equiv="X-UA-Compatible" content="IE=Edge">
	<meta charset="utf-8">
	<title>GSAP - delay()</title>
    <script src="js/jquery.js"></script>
	<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.8.0/gsap.min.js"></script>
    <script>
        $(function(){
            $('.btn').click(function(){
                gsap.fromTo('.tweenbox', 1.5, { scaleX:1, scaleY:1, rotation:0, delay: 0 }, {scaleX:2, scaleY:2, rotation:180, delay: .5 });
            });
        });
    </script>
    <style>
        .btn {display:inline-block;padding:5px 10px 6px;background-color:#333;font-size:13px;color:#fff;text-decoration:none}
        .content {display:flex;justify-content:center;padding:200px 0;border:1px solid #000}
        .tweenbox {width:100px;height:100px;border:2px solid crimson;background:lightcoral;box-sizing:border-box}	
    </style>
</head>
<body>
<a href="#none" class="btn">Toggle Tween Delay</a>
<div class="content">
    <div class="tweenbox"></div>
</div>
</body>
</html>
